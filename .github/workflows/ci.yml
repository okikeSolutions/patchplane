name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Full repository gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - run: bun install --frozen-lockfile

      - run: bun run verify

      - name: Verify committed generated files are current
        run: git diff --exit-code -- apps/client/src/routeTree.gen.ts
